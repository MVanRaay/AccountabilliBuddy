<!DOCTYPE html>
<html th:fragment="navbar" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en-US">

<nav class="navbar navbar-expand-lg navbar-light navbar-app fixed-top">
    <div class="container ab-page-wide px-3 px-md-4">

        <a class="navbar-brand" th:href="@{/}">AccountabiliBuddy</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
                aria-controls="mainNavbar"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-1">

                <li class="nav-item">
                    <a th:href="@{/goals}"
                       th:class="${'nav-link' + (#httpServletRequest != null and #strings.startsWith(#httpServletRequest.requestURI, '/goals') ? ' active' : '')}">Goals</a>
                </li>

                <li class="nav-item">
                    <a th:href="@{/friends}"
                       th:class="${'nav-link' + (#httpServletRequest != null and #strings.startsWith(#httpServletRequest.requestURI, '/friends') ? ' active' : '')}">Buddies</a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a th:href="@{/profile}"
                       th:class="${'nav-link' + (#httpServletRequest != null and #strings.startsWith(#httpServletRequest.requestURI, '/profile') ? ' active' : '')}">Profile</a>
                </li>

            </ul>

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}">Sign in</a>
                </li>

                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle rounded-2"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown"
                       aria-expanded="false">
                        <span th:if="${currentUser != null}"
                              th:text="${currentUser.firstName}">You</span>
                        <span th:if="${currentUser == null}">Account</span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3 mt-1">

                        <li>
                            <a class="dropdown-item rounded-2 mx-1" th:href="@{/profile}">Profile</a>
                        </li>

                        <li><hr class="dropdown-divider my-1"></li>

                        <li>
                            <form th:action="@{/logout}" method="post" class="px-2 pb-1">
                                <button class="btn btn-link dropdown-item text-danger rounded-2 py-2" type="submit">
                                    Log out
                                </button>
                            </form>
                        </li>

                    </ul>
                </li>

            </ul>

        </div>
    </div>
</nav>
</html>

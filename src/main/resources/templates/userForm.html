<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Complete registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4 px-3 ab-page-narrow">

    <div class="card ab-form-card border-0">
        <div class="card-header">
            <h1 class="h4 mb-0 fw-bold">Complete your registration</h1>
            <p class="ab-subtitle small mb-0 mt-1">Confirm your name so friends can find you.</p>
        </div>
        <div class="card-body">
            <p th:if="${error}" th:text="${error}" class="alert alert-danger small py-2 mb-3"></p>

            <form th:action="@{/users/register}" method="post">

                <div class="mb-4">
                    <label for="first-name" class="form-label">First name</label>
                    <input id="first-name" type="text" name="firstName" th:value="${user.firstName}"
                           class="form-control form-control-lg" required>
                </div>

                <div class="mb-4">
                    <label for="last-name" class="form-label">Last name</label>
                    <input id="last-name" type="text" name="lastName" th:value="${user.lastName}"
                           class="form-control form-control-lg" required>
                </div>

                <div class="mb-4">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" type="email" th:value="${user.email}" class="form-control" disabled>
                </div>

                <button type="submit" class="btn btn-ab-primary text-white w-100 py-2">
                    Finish registration
                </button>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

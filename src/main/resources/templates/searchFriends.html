<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Find friends</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4 ab-page-wide px-3 px-md-4">

    <div class="mb-4">
        <a class="btn btn-link text-decoration-none text-secondary px-0 fw-medium" th:href="@{/friends}">← Back to buddies</a>
    </div>

    <div class="card ab-card border-0 mx-auto" style="max-width: 560px;">
        <div class="card-body p-4 p-md-5">
            <div class="text-center text-md-start mb-4">
                <h1 class="ab-title h4 mb-1">Find friends</h1>
                <p class="ab-subtitle small mb-0">Search by first name, last name, or email.</p>
            </div>

            <label for="searchInput" class="form-label fw-semibold small text-secondary">Search</label>
            <div class="input-group input-group-lg mb-3">
                <span class="input-group-text bg-white border-end-0 text-muted">⌕</span>
                <input
                        id="searchInput"
                        type="text"
                        class="form-control border-start-0 ps-0 ab-search-input shadow-none"
                        placeholder="Start typing a name or email…"
                        autofocus
                        autocomplete="off">
            </div>

            <div id="resultsContainer" class="list-group ab-search-results border-0">
                <div class="list-group-item text-muted text-center py-4 border-0 rounded-3 bg-light bg-opacity-50">
                    Start typing to search
                </div>
            </div>
        </div>
    </div>

</main>

<script>
    const input = document.getElementById("searchInput");
    const resultsContainer = document.getElementById("resultsContainer");
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    let debounceTimer;

    input.addEventListener("input", () => {
        clearTimeout(debounceTimer);

        debounceTimer = setTimeout(() => {
            const searchTerm = input.value.trim();

            if (searchTerm.length === 0) {
                resultsContainer.innerHTML =
                    `<div class="list-group-item text-muted text-center py-4 border-0 rounded-3 bg-light bg-opacity-50">
                        Start typing to search
                     </div>`;
                return;
            }

            fetch(`/friends/search?searchTerm=${encodeURIComponent(searchTerm)}`)
                .then(response => response.json())
                .then(users => renderResults(users))
                .catch(() => {
                    resultsContainer.innerHTML =
                        `<div class="list-group-item text-danger text-center py-4 border-0 rounded-3">
                            Something went wrong. Try again.
                         </div>`;
                });

        }, 300);
    });

    function renderResults(users) {
        if (!users || users.length === 0) {
            resultsContainer.innerHTML =
                `<div class="list-group-item text-muted text-center py-4 border-0 rounded-3 bg-light bg-opacity-50">
                    No users found
                 </div>`;
            return;
        }

        let html = "";
        users.forEach(user => {
            html += `
                <div class="list-group-item d-flex align-items-center justify-content-between gap-3 py-3">
                    <div class="min-w-0">
                        <div class="fw-semibold text-truncate">${user.firstName} ${user.lastName}</div>
                        <small class="text-muted text-truncate d-block">${user.email || ""}</small>
                    </div>
                    <button type="button"
                            class="btn btn-sm btn-ab-primary text-white flex-shrink-0"
                            onclick="addFriend(${user.id})">
                        Add
                    </button>
                </div>
            `;
        });

        resultsContainer.innerHTML = html;
    }

    function addFriend(friendId) {
        const params = new URLSearchParams();
        params.append("friendId", friendId);

        fetch("/friends", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
                [csrfHeader]: csrfToken
            },
            body: params.toString()
        }).then(response => {
            if (response.redirected) {
                window.location.href = response.url;
            } else if (response.ok) {
                window.location.href = "/friends";
            } else {
                resultsContainer.innerHTML =
                    `<div class="list-group-item text-danger text-center py-4 border-0 rounded-3">
                        Could not add friend. Try again.
                     </div>`;
            }
        }).catch(() => {
            resultsContainer.innerHTML =
                `<div class="list-group-item text-danger text-center py-4 border-0 rounded-3">
                    Could not add friend. Try again.
                 </div>`;
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

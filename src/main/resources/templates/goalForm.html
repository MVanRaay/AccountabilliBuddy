<!DOCTYPE html>
<html lang="en-US" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Goal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4 px-3 ab-page-narrow">

    <div class="mb-4">
        <a class="btn btn-link text-decoration-none text-secondary px-0 fw-medium" th:href="@{/goals}">← Back to goals</a>
    </div>

    <div class="card ab-form-card border-0">
        <div class="card-header text-center text-sm-start">
            <h1 class="h4 mb-0 fw-bold">Create a goal</h1>
            <p class="ab-subtitle small mb-0 mt-1">Choose a rhythm that fits how you want to be held accountable.</p>
        </div>
        <div class="card-body">
            <form th:action="@{/goals/new}" method="post">

                <div class="mb-4">
                    <label for="title" class="form-label">Goal title</label>
                    <input type="text" class="form-control form-control-lg" id="title" name="title"
                           placeholder="e.g. Morning workout" required>
                </div>

                <div class="mb-4">
                    <label for="timeFrame" class="form-label">Timeframe</label>
                    <select class="form-select form-select-lg" id="timeFrame" name="timeFrame" required
                            onchange="toggleEndDate()">
                        <option value="" disabled selected>Select timeframe</option>
                        <option value="Daily">Daily</option>
                        <option value="Weekly">Weekly</option>
                        <option value="Bi-Weekly">Bi-Weekly</option>
                        <option value="Monthly">Monthly</option>
                        <option value="Once">Once</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="completionsPerTimeFrame" class="form-label">Completions per timeframe</label>
                    <input type="number" min="1" class="form-control form-control-lg" id="completionsPerTimeFrame"
                           name="completionsPerTimeFrame" placeholder="e.g. 1, 2, 3" required>
                    <div class="form-text">How many times you want to hit this goal inside each period.</div>
                </div>

                <div class="mb-4">
                    <label for="endDate" class="form-label">End date</label>
                    <input type="date" class="form-control form-control-lg" id="endDate" name="endDateRaw">
                    <div class="form-text text-muted" id="endDateHelp">Optional unless timeframe is "Once".</div>
                </div>

                <button type="submit" class="btn btn-ab-primary text-white w-100 py-2 mt-2">
                    Create goal
                </button>
            </form>
        </div>
    </div>
</main>

<script>
    function toggleEndDate() {
        const timeframe = document.getElementById('timeFrame').value;
        const endDateInput = document.getElementById('endDate');
        const helpText = document.getElementById('endDateHelp');

        if (timeframe === 'Once') {
            endDateInput.required = true;
            helpText.textContent = 'End date is required for one-time goals.';
        } else {
            endDateInput.required = false;
            helpText.textContent = 'Optional unless timeframe is "Once".';
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

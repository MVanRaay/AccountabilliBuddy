<!DOCTYPE html>
<html lang="en-US" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .friend-card {
            margin-bottom: 0.75rem;
        }

        .friend-initials {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #0d6efd;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-right: 0.75rem;
        }

        .friend-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .friend-email {
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-3 mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">My Friends</h2>
        <a class="btn btn-sm btn-outline-primary" th:href="@{/friends/find}">
            Find friends
        </a>
    </div>

    <div th:if="${#lists.isEmpty(friends)}">
        <p class="text-muted">No friends yet. Use the “Find friends” button to add some buddies.</p>
    </div>

    <div th:if="${!#lists.isEmpty(friends)}" class="list-group">
        <button type="button"
                class="list-group-item friend-card d-flex align-items-center text-start"
                th:each="friend : ${friends}"
                data-bs-toggle="modal"
                data-bs-target="#friendDetailsModal"
                th:attr="data-friend-name=${friend.firstName + ' ' + friend.lastName},
                         data-friend-email=${friend.email},
                         data-friend-id=${friend.id}">
            <div class="friend-initials"
                 th:text="${#strings.substring(friend.firstName, 0, 1)} + ${#strings.substring(friend.lastName, 0, 1)}">
                AB
            </div>
            <div>
                <div class="friend-name"
                     th:text="${friend.firstName} + ' ' + ${friend.lastName}">
                    Friend Name
                </div>
                <div class="friend-email"
                     th:text="${friend.email}">
                    friend@example.com
                </div>
            </div>
        </button>
        <!-- Hidden per-friend goals content -->
        <div class="d-none friend-goals-content"
             th:each="friend : ${friends}"
             th:id="'friend-goals-' + ${friend.id}">
            <p class="mb-2"><strong>Goals:</strong></p>
            <div th:if="${#lists.isEmpty(friendGoals[friend.id])}">
                <p class="text-muted mb-0">No goals found for this friend.</p>
            </div>
            <ul class="mb-0" th:if="${!#lists.isEmpty(friendGoals[friend.id])}">
                <li th:each="goal : ${friendGoals[friend.id]}">
                    <span th:text="${goal.title}">Goal title</span>
                    <span class="text-muted small">
                        (
                        <span th:text="${goal.timeFrame}">Timeframe</span>,
                        <span th:text="${goal.completionsPerTimeFrame}"></span>x per timeframe
                        )
                    </span>
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- Friend details modal -->
<div class="modal fade" id="friendDetailsModal" tabindex="-1" aria-labelledby="friendDetailsLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="friendDetailsLabel">Friend details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="mb-1"><strong>Name:</strong> <span id="modalFriendName"></span></p>
                <p class="mb-2"><strong>Email:</strong> <span id="modalFriendEmail"></span></p>
                <hr>
                <div id="modalFriendGoals"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const friendDetailsModal = document.getElementById('friendDetailsModal');
    if (friendDetailsModal) {
        friendDetailsModal.addEventListener('show.bs.modal', event => {
            const button = event.relatedTarget;
            if (!button) return;

            const name = button.getAttribute('data-friend-name') || '';
            const email = button.getAttribute('data-friend-email') || '';
            const friendId = button.getAttribute('data-friend-id');

            document.getElementById('modalFriendName').textContent = name;
            document.getElementById('modalFriendEmail').textContent = email;

            const goalsContainer = document.getElementById('modalFriendGoals');
            if (goalsContainer) {
                const source = friendId ? document.getElementById('friend-goals-' + friendId) : null;
                goalsContainer.innerHTML = source ? source.innerHTML : '<p class="text-muted mb-0">No goals found for this friend.</p>';
            }
        });
    }
</script>

</body>
</html>

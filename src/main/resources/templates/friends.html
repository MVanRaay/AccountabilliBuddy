<!DOCTYPE html>
<html lang="en-US" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .friend-card {
            margin-bottom: 0.75rem;
        }

        .friend-initials {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #0d6efd;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-right: 0.75rem;
        }

        .friend-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .friend-email {
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-3 mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">My Friends</h2>
        <a class="btn btn-sm btn-outline-primary" th:href="@{/friends/find}">
            Find friends
        </a>
    </div>

    <div th:if="${#lists.isEmpty(friends)}">
        <p class="text-muted">No friends yet. Use the “Find friends” button to add some buddies.</p>
    </div>

    <div th:if="${!#lists.isEmpty(friends)}" class="list-group">
        <div class="list-group-item friend-card d-flex align-items-center"
             th:each="friend : ${friends}">
            <div class="friend-initials"
                 th:text="${#strings.substring(friend.firstName, 0, 1)} + ${#strings.substring(friend.lastName, 0, 1)}">
                AB
            </div>
            <div>
                <div class="friend-name"
                     th:text="${friend.firstName} + ' ' + ${friend.lastName}">
                    Friend Name
                </div>
                <div class="friend-email"
                     th:text="${friend.email}">
                    friend@example.com
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

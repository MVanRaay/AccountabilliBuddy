<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Goal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4 px-3 ab-page-narrow">

    <div class="mb-4">
        <a class="btn btn-link text-decoration-none text-secondary px-0 fw-medium" th:href="@{/goals}">← Back to goals</a>
    </div>

    <div class="card ab-form-card border-0">
        <div class="card-header">
            <h1 class="h4 mb-0 fw-bold">Edit goal</h1>
            <p class="ab-subtitle small mb-0 mt-1">Update how often you want to complete this goal.</p>
        </div>
        <div class="card-body">
            <form th:action="@{'/goals/' + ${goal.id}}" method="post">

                <div class="mb-4">
                    <label for="title" class="form-label">Goal title</label>
                    <input type="text"
                           class="form-control form-control-lg"
                           id="title"
                           name="title"
                           th:value="${goal.title}"
                           required>
                </div>

                <div class="mb-4">
                    <label for="timeFrame" class="form-label">Timeframe</label>
                    <select class="form-select form-select-lg"
                            id="timeFrame"
                            name="timeFrame"
                            onchange="toggleEndDate()"
                            required>
                        <option value="Daily" th:selected="${goal.timeFrame == 'Daily'}">Daily</option>
                        <option value="Weekly" th:selected="${goal.timeFrame == 'Weekly'}">Weekly</option>
                        <option value="Bi-Weekly" th:selected="${goal.timeFrame == 'Bi-Weekly'}">Bi-Weekly</option>
                        <option value="Monthly" th:selected="${goal.timeFrame == 'Monthly'}">Monthly</option>
                        <option value="Once" th:selected="${goal.timeFrame == 'Once'}">Once</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="completionsPerTimeFrame" class="form-label">
                        Completions per timeframe
                    </label>
                    <input type="number"
                           min="1"
                           class="form-control form-control-lg"
                           id="completionsPerTimeFrame"
                           name="completionsPerTimeFrame"
                           th:value="${goal.completionsPerTimeFrame}"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Start date</label>
                    <input type="text"
                           class="form-control"
                           th:value="${#temporals.format(goal.startDate, 'MMM dd, yyyy HH:mm')}"
                           readonly>
                </div>

                <div class="mb-4">
                    <label for="endDate" class="form-label">End date</label>
                    <input type="date"
                           class="form-control form-control-lg"
                           id="endDate"
                           name="endDateRaw"
                           th:value="${goal.endDate != null ? #temporals.format(goal.endDate, 'yyyy-MM-dd') : ''}">
                    <div class="form-text text-muted" id="endDateHelp">
                        Required if timeframe is "Once"
                    </div>
                </div>

                <div class="mb-4" th:if="${goal.completionDate != null}">
                    <label class="form-label">Completed on</label>
                    <input type="text"
                           class="form-control"
                           th:value="${#temporals.format(goal.completionDate, 'MMM dd, yyyy HH:mm')}"
                           readonly>
                </div>

                <div class="d-flex flex-wrap gap-2 pt-2">
                    <button type="submit" class="btn btn-ab-primary text-white">
                        Save changes
                    </button>
                    <a th:href="@{/goals}" class="btn btn-outline-secondary btn-ab-outline">
                        Cancel
                    </a>
                    <a class="btn btn-ab-danger-outline ms-sm-auto"
                       th:href="@{'/goals/' + ${goal.id} + '/delete'}">Delete goal</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    function toggleEndDate() {
        const timeframe = document.getElementById('timeFrame').value;
        const endDate = document.getElementById('endDate');
        const helpText = document.getElementById('endDateHelp');

        if (timeframe === 'Once') {
            endDate.required = true;
            helpText.innerText = 'Required for one-time goals.';
        } else {
            endDate.required = false;
            helpText.innerText = 'Optional unless timeframe is "Once".';
        }
    }

    document.addEventListener('DOMContentLoaded', toggleEndDate);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
